<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Editor — Postmark</title>
  <link rel="stylesheet" href="vendor/grapesjs/grapes.min.css" />
  <link rel="stylesheet" href="vendor/codemirror/codemirror.css" />
  <link rel="stylesheet" href="vendor/codemirror/theme/material-darker.css" />
  <link rel="stylesheet" href="css/editor.css" />
</head>
<body>
  <div class="ed-shell">
    <!-- ============================ TOP BAR ============================ -->
    <header class="ed-head">
      <div class="left">
        <a class="back" href="index.html" title="Back to dashboard">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </a>
        <div class="doc">
          <span class="name" id="doc-name">Email</span>
          <span class="mode" id="doc-mode"><span class="dot"></span><span class="mode-text"></span></span>
        </div>
      </div>

      <div class="center">
        <!-- device options -->
        <div class="devswitch" id="devswitch" title="Preview device">
          <button data-dev="desktop" class="on" title="Desktop">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          </button>
          <button data-dev="tablet" title="Tablet">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
          </button>
          <button data-dev="mobile" title="Mobile">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
          </button>
        </div>

        <span class="divider"></span>

        <!-- undo / redo -->
        <button class="iconbtn" id="btn-undo" title="Undo (Ctrl+Z)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
        </button>
        <button class="iconbtn" id="btn-redo" title="Redo (Ctrl+Shift+Z)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg>
        </button>

        <span class="divider"></span>

        <!-- zoom -->
        <button class="iconbtn" id="btn-zoom-out" title="Zoom out">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
        <span class="zoom-label" id="zoom-label">100%</span>
        <button class="iconbtn" id="btn-zoom-in" title="Zoom in">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
        <button class="iconbtn" id="btn-zoom-reset" title="Reset zoom">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9 9 0 0 0-6.7 3"/><polyline points="3 4 3 9 8 9"/></svg>
        </button>

        <span class="divider"></span>

        <!-- reset content -->
        <button class="iconbtn danger" id="btn-reset" title="Reset canvas">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
        </button>
      </div>

      <div class="right">
        <button class="ebtn" id="btn-code" title="View / import code">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          Code
        </button>
        <button class="ebtn accent" id="btn-preview" title="Open preview in new tab">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          Preview
        </button>
        <button class="ebtn" id="btn-save">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save
        </button>
        <button class="ebtn primary" id="btn-export">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export
        </button>
      </div>
    </header>

    <!-- ============================ BODY ============================ -->
    <div class="ed-body">
      <!-- LEFT PANEL: tabs (Blocks+Templates | Layers) -->
      <aside class="ed-left">
        <div class="tabs" id="left-tabs">
          <button data-tab="blocks" class="on">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Blocks
          </button>
          <button data-tab="layers">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
            Layers
          </button>
        </div>
        <div class="tab-body">
          <div id="tab-blocks" class="tab-pane">
            <div id="blocks" class="blocks-host"></div>
          </div>
          <div id="tab-layers" class="tab-pane" style="display:none;">
            <div id="layers" class="layers-host"></div>
          </div>
        </div>
      </aside>

      <!-- CENTER CANVAS -->
      <main class="ed-main">
        <div id="gjs"></div>
      </main>

      <!-- RIGHT PANEL: selected component properties only -->
      <aside class="ed-right" id="right-panel">
        <div class="rp-head">
          <span class="rp-title">Properties</span>
          <span class="rp-sel" id="sel-name"></span>
        </div>
        <div class="rp-empty" id="right-empty">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 2 2 7l10 5 10-5-10-5z"/><path d="m2 17 10 5 10-5M2 12l10 5 10-5"/></svg>
          <p>Select an element on the canvas to edit its properties.</p>
        </div>
        <div class="rp-body">
          <div class="rp-section">
            <div class="rp-label">Settings</div>
            <div id="traits"></div>
          </div>
          <div class="rp-section">
            <div class="rp-label">Classes</div>
            <div id="selectors"></div>
          </div>
          <div class="rp-section">
            <div class="rp-label">Style</div>
            <div id="styles"></div>
          </div>
          <div class="rp-section rp-code-section">
            <div class="rp-label rp-code-toggle" id="rp-code-toggle">
              <span>Edit code</span>
              <span class="rp-code-caret" id="rp-code-caret">▸</span>
            </div>
            <div class="rp-code-body" id="rp-code-body" style="display:none;">
              <div class="rp-code-group">
                <div class="rp-code-head">
                  <span>HTML</span>
                  <button class="rp-code-apply" id="rp-html-apply" type="button">Apply HTML</button>
                </div>
                <div id="rp-html-editor" class="rp-code-editor"></div>
              </div>
              <div class="rp-code-group">
                <div class="rp-code-head">
                  <span>CSS <small id="rp-css-target"></small></span>
                  <button class="rp-code-apply" id="rp-css-apply" type="button">Apply CSS</button>
                </div>
                <div id="rp-css-editor" class="rp-code-editor"></div>
                <p class="rp-code-hint" id="rp-css-hint"></p>
              </div>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <!-- Code modal -->
  <div class="cmodal-bg" id="code-modal">
    <div class="cmodal">
      <div class="ch">
        <h3 id="code-title">Code</h3>
        <button class="iconbtn" id="code-close" title="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="cm-wrap">
        <textarea id="code-area" spellcheck="false"></textarea>
      </div>
      <div class="cf">
        <button class="ebtn" id="code-copy">Copy</button>
        <button class="ebtn primary" id="code-import">Apply to canvas</button>
      </div>
    </div>
  </div>

  <!-- Loading / error overlay -->
  <div class="ovl" id="overlay">
    <div class="spinner"></div>
    <div class="msg" id="ovl-msg">Loading editor…</div>
    <div class="sub" id="ovl-sub"></div>
  </div>

  <div class="toast-host" id="toast-host"></div>

  <!-- Local vendor libraries (NO CDN) -->
  <script src="vendor/jszip/jszip.min.js"></script>
  <script src="vendor/mjml-browser/mjml-browser.js"></script>
  <script src="vendor/grapesjs/grapes.min.js"></script>
  <script src="vendor/grapesjs-preset-newsletter/grapesjs-preset-newsletter.min.js"></script>
  <script src="vendor/grapesjs-mjml/grapesjs-mjml.min.js"></script>
  <!-- CodeMirror (local, no CDN) for the code editor -->
  <script src="vendor/codemirror/codemirror.js"></script>
  <script src="vendor/codemirror/mode/xml.js"></script>
  <script src="vendor/codemirror/mode/javascript.js"></script>
  <script src="vendor/codemirror/mode/css.js"></script>
  <script src="vendor/codemirror/mode/htmlmixed.js"></script>
  <script src="vendor/codemirror/addon/xml-fold.js"></script>
  <script src="vendor/codemirror/addon/closetag.js"></script>
  <script src="vendor/codemirror/addon/matchbrackets.js"></script>
  <!-- App -->
  <script src="js/package-handler.js"></script>
  <script src="js/brand-styles.js"></script>
  <script src="js/editor.js"></script>
</body>
</html>
